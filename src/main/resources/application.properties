# Server Port
server.port=8080

# Application Name
spring.application.name=personal-finance-manager

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:financedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate (JPA) Configuration
# This tells Spring to automatically create your database tables based on your Java classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console Configuration (Allows you to view the DB in your browser)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console